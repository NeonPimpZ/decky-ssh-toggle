name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build plugin zip
        run: npm run pack

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: decky-ssh-toggle.zip
